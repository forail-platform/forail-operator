apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: inventories.forail.forail-platform.io
spec:
  group: forail.forail-platform.io
  names:
    kind: Inventory
    listKind: InventoryList
    plural: inventories
    singular: inventory
    shortNames: [inv]
    categories: [forail]
  scope: Namespaced
  versions:
    - name: v1alpha1
      served: true
      storage: true
      subresources:
        status: {}
      additionalPrinterColumns:
        - name: Forail ID
          type: integer
          jsonPath: .status.forailId
        - name: Org
          type: string
          jsonPath: .spec.organization
        - name: Hosts
          type: integer
          jsonPath: .status.hostCount
        - name: Groups
          type: integer
          jsonPath: .status.groupCount
        - name: Ready
          type: string
          jsonPath: .status.conditions[?(@.type=="Ready")].status
        - name: Age
          type: date
          jsonPath: .metadata.creationTimestamp
      schema:
        openAPIV3Schema:
          type: object
          required: [spec]
          properties:
            spec:
              type: object
              required: [organization]
              properties:
                name:
                  type: string
                description:
                  type: string
                organization:
                  type: string
                variables:
                  type: string
                hosts:
                  type: array
                  items:
                    type: object
                    required: [name]
                    properties:
                      name:
                        type: string
                      enabled:
                        type: boolean
                        default: true
                      description:
                        type: string
                      variables:
                        type: string
                groups:
                  type: array
                  items:
                    type: object
                    required: [name]
                    properties:
                      name:
                        type: string
                      description:
                        type: string
                      variables:
                        type: string
                      hosts:
                        type: array
                        items:
                          type: string
                      children:
                        type: array
                        items:
                          type: string
            status:
              type: object
              properties:
                forailId:
                  type: integer
                  format: int64
                hostCount:
                  type: integer
                  format: int32
                groupCount:
                  type: integer
                  format: int32
                observedGeneration:
                  type: integer
                  format: int64
                conditions:
                  type: array
                  items:
                    type: object
                    required: [type, status, lastTransitionTime, reason]
                    properties:
                      type:
                        type: string
                      status:
                        type: string
                        enum: ["True", "False", "Unknown"]
                      observedGeneration:
                        type: integer
                        format: int64
                      lastTransitionTime:
                        type: string
                        format: date-time
                      reason:
                        type: string
                      message:
                        type: string
