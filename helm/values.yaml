# forail-operator — Helm values

# ── Image ─────────────────────────────────────────────────
image:
  repository: ghcr.io/forail-platform/forail-operator
  tag: "2026.06.0"
  pullPolicy: IfNotPresent

# Public ghcr.io images do not require pull secrets.
imagePullSecrets: []

# ── Forail connection ─────────────────────────────────────
forail:
  # In-cluster URL to the forail-web service. Override if using an external
  # Forail instance.
  url: http://forail-web.forail.svc.cluster.local:8013

  # Skip TLS verification (only when forail.url is HTTPS with self-signed).
  insecureSkipVerify: false

  # Optional Host header override — needed when reaching Forail through
  # an Ingress that routes by hostname but forail.url uses an IP.
  hostHeader: ""

  # OAuth2 personal access token. Generate with:
  #   kubectl -n forail exec deploy/forail-web -- forail-manage create_oauth2_token --user admin
  # Set token directly here, or set existingSecret to point at a
  # pre-created Secret with key "token".
  token: ""
  existingSecret: ""

# ── Operator deployment ──────────────────────────────────
replicas: 1

resources:
  requests: { memory: 64Mi, cpu: 50m }
  limits:   { memory: 256Mi, cpu: 500m }

leaderElection: false

# ── RBAC ─────────────────────────────────────────────────
rbac:
  create: true

serviceAccount:
  create: true
  name: forail-operator

# ── Metrics / Probes ─────────────────────────────────────
metrics:
  port: 8080
probe:
  port: 8081

# ── CRDs ─────────────────────────────────────────────────
# Helm installs files under crds/ on `helm install`, but does not
# update them on upgrade — that is by Helm design. To force a refresh:
#   helm uninstall forail-operator && helm install forail-operator ...
# Or apply manually: kubectl apply -f config/crd/bases/
crds:
  install: true
