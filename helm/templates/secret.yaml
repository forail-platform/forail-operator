{{- if not .Values.forail.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: forail-operator-credentials
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "forail-operator.labels" . | nindent 4 }}
type: Opaque
stringData:
  token: {{ required "forail.token (or forail.existingSecret) is required" .Values.forail.token | quote }}
{{- end }}
