apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-forail-operator
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "forail-operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "forail-operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "forail-operator.selectorLabels" . | nindent 8 }}
        {{- include "forail-operator.labels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "forail-operator.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets: {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: manager
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --metrics-bind-address=:{{ .Values.metrics.port }}
            - --health-probe-bind-address=:{{ .Values.probe.port }}
            {{- if .Values.leaderElection }}
            - --leader-elect=true
            {{- end }}
          env:
            - name: FORAIL_URL
              value: {{ .Values.forail.url | quote }}
            {{- if .Values.forail.hostHeader }}
            - name: FORAIL_HOST_HEADER
              value: {{ .Values.forail.hostHeader | quote }}
            {{- end }}
            - name: FORAIL_INSECURE
              value: {{ .Values.forail.insecureSkipVerify | quote }}
            - name: FORAIL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ include "forail-operator.tokenSecretName" . }}
                  key: token
          ports:
            - { name: metrics, containerPort: {{ .Values.metrics.port }} }
            - { name: probe,   containerPort: {{ .Values.probe.port }} }
          livenessProbe:
            httpGet: { path: /healthz, port: probe }
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /readyz, port: probe }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
