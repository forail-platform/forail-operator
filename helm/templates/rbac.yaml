{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Release.Name }}-forail-operator
  labels:
    {{- include "forail-operator.labels" . | nindent 4 }}
rules:
  - apiGroups: ["forail.forail-platform.io"]
    resources: ["jobtemplates", "inventories", "credentials", "schedules", "projects", "organizations", "teams", "workflows", "forailinstances"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["forail.forail-platform.io"]
    resources: ["jobtemplates/status", "inventories/status", "credentials/status", "schedules/status", "projects/status", "organizations/status", "teams/status", "workflows/status", "forailinstances/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["forail.forail-platform.io"]
    resources: ["jobtemplates/finalizers", "inventories/finalizers", "credentials/finalizers", "schedules/finalizers", "projects/finalizers", "organizations/finalizers", "teams/finalizers", "workflows/finalizers"]
    verbs: ["update"]
  # Credential reconciler reads referenced k8s Secrets for sensitive
  # input fields (passwords, ssh keys, vault tokens).
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  {{- if .Values.leaderElection }}
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update"]
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Release.Name }}-forail-operator
  labels:
    {{- include "forail-operator.labels" . | nindent 4 }}
subjects:
  - kind: ServiceAccount
    name: {{ include "forail-operator.serviceAccountName" . }}
    namespace: {{ .Release.Namespace }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Release.Name }}-forail-operator
{{- end }}
