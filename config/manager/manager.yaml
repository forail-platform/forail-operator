apiVersion: v1
kind: Namespace
metadata:
  name: forail-operator
---
# Forail OAuth2 Personal Access Token. Generate with:
#   kubectl -n forail exec deploy/forail-web -- forail-manage create_oauth2_token --user admin
# Then base64-encode the token and set it here, or replace stringData.
apiVersion: v1
kind: Secret
metadata:
  name: forail-credentials
  namespace: forail-operator
type: Opaque
stringData:
  token: "REPLACE_WITH_FORAIL_OAUTH2_PAT"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forail-operator
  namespace: forail-operator
  labels:
    app.kubernetes.io/name: forail-operator
    app.kubernetes.io/part-of: forail-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: forail-operator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: forail-operator
    spec:
      serviceAccountName: forail-operator
      containers:
        - name: manager
          image: ghcr.io/forail-platform/forail-operator:2026.06.0
          imagePullPolicy: IfNotPresent
          args:
            - --metrics-bind-address=:8080
            - --health-probe-bind-address=:8081
          env:
            # In-cluster service URL — bypasses the Ingress, plain HTTP on
            # the pod network. No Host header needed because forail-web's
            # internal nginx accepts any Host.
            - name: FORAIL_URL
              value: http://forail-web.forail.svc.cluster.local:8013
            - name: FORAIL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: forail-credentials
                  key: token
            - name: FORAIL_INSECURE
              value: "false"
          ports:
            - { name: metrics, containerPort: 8080 }
            - { name: probe, containerPort: 8081 }
          livenessProbe:
            httpGet: { path: /healthz, port: probe }
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet: { path: /readyz, port: probe }
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests: { memory: 64Mi, cpu: 50m }
            limits:   { memory: 256Mi, cpu: 500m }
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 65532
