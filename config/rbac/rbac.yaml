apiVersion: v1
kind: Namespace
metadata:
  name: forge-operator
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: forge-operator
  namespace: forge-operator
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: forge-operator
rules:
  - apiGroups: ["forge.forgeplatform.io"]
    resources: ["jobtemplates", "inventories", "credentials", "schedules", "projects", "organizations", "teams", "workflows", "forgeinstances"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["forge.forgeplatform.io"]
    resources: ["jobtemplates/status", "inventories/status", "credentials/status", "schedules/status", "projects/status", "organizations/status", "teams/status", "workflows/status", "forgeinstances/status"]
    verbs: ["get", "update", "patch"]
  - apiGroups: ["forge.forgeplatform.io"]
    resources: ["jobtemplates/finalizers", "inventories/finalizers", "credentials/finalizers", "schedules/finalizers", "projects/finalizers", "organizations/finalizers", "teams/finalizers", "workflows/finalizers"]
    verbs: ["update"]
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # Leader election (optional, only when --leader-elect)
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: forge-operator
subjects:
  - kind: ServiceAccount
    name: forge-operator
    namespace: forge-operator
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: forge-operator
