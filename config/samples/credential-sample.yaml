# Two-step pattern: first the Secret with sensitive fields, then the
# Credential CR that references it.
apiVersion: v1
kind: Secret
metadata:
  name: deploy-ssh
  namespace: default
type: Opaque
stringData:
  # Replace the placeholder with a real OpenSSH private key BEFORE
  # applying — Forail validates the key on credential create and returns
  # HTTP 500 with `binascii.Error: Invalid base64-encoded string` if the
  # body is not a parseable key. Generate one with:
  #   ssh-keygen -t ed25519 -N '' -f ./deploy_key -C 'forail-deploy'
  # then paste the contents of ./deploy_key here.
  ssh_key_data: |
    -----BEGIN OPENSSH PRIVATE KEY-----
    PLACEHOLDER-REPLACE-BEFORE-APPLY
    -----END OPENSSH PRIVATE KEY-----
---
apiVersion: forail.forail-platform.io/v1alpha1
kind: Credential
metadata:
  name: deploy-key
  namespace: default
spec:
  description: "SSH key used by deploy automation"
  organization: Default
  credentialType: Machine
  inputs:
    username: deploy
  inputsFrom:
    - name: ssh_key_data
      valueFrom:
        name: deploy-ssh
        key: ssh_key_data
